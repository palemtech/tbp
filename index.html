   <h4 class="mdl-dialog__title">
    Oba ókóran font
   </h4>
   <div class="mdl-dialog__actions">
    <button class="close mdl-button" id="close-font-size-dialog">
     Tótóp
    </button>
    <button class="mdl-button" id="increase-font-size">
     +
    </button>
    <button class="mdl-button" id="decrease-font-size">
     -
    </button>
   </div>
  </dialog>
  <div id="toolbar-top">
   <div class="navigation-top">
   <img src="icons/icon-36.png" id="nav-app-icon"></img>
    <span id="book-selector">
     <a href="#" id="book-selector-a" onclick="toggleBookMenu(); return false;">
      Saér Nyanyian
     </a>
    </span>
    <span id="chapter-selector">
     <a href="#" id="chapter-selector-a" onclick="toggleChapterMenu(chapters, hasIntro, baseRef); return false;">
      1
     </a>
    </span>
    <button class="mdl-button mdl-js-button mdl-button--icon" id="top-right-menu">
     <i class="material-icons">
      more_vert
     </i>
    </button>
    <ul class="mdl-menu mdl-menu--bottom-right mdl-js-menu mdl-js-ripple-effect" for="top-right-menu" id="menu_ul_id">
     <li class="mdl-menu__item" id="font_adjust_menu_btn">
      Oba ókóran font
     </li>
    </ul>
   </div>
  </div>
  <div id="content">
  </div>
  <div id="toolbar-bottom">
   <span class="button cpt_button prev_cpt_button md1-button mdl-js-button mdl-button--fab" id="prev_cpt_button" data-prev="Aktb-03-FRT-2-001">
     <span class="cpt_btn_text">&lt;</span>
   </span>
   <div class="cpt_button md1-button mdl-js-button mdl-button--fab" id="play-button">
    <i class="material-icons" id="play-btn-i">
     play_arrow
    </i>
   </div>
   <audio id="audio-elem"></audio>
   <span class="button cpt_button next_cpt_button md1-button mdl-js-button mdl-button--fab" id="next_cpt_button">
     <span class="cpt_btn_text">&gt;</span>
   </span>
  </div>
<script type="text/javascript">

<script id="myscript" type="text/javascript">
	function reloadPage(name) {
		hideBookMenu();
		hideChapterMenu();
		let results = loadPage(name, initFootnotes);
		chapters = results.chapters;
		hasIntro = results.hasIntro;
		baseRef = results.baseRef;
		document.title = results.title;
	}

	$('#next_cpt_button').click(function(){
		reloadPage($(this).data('data-next'));
		
	});
	$('#prev_cpt_button').click(function() {
		reloadPage($(this).data('data-prev'));
		
	});
	
	let audioBtn = $('#play-button');
	let audio = document.getElementById('audio-elem')
	let audioI = $('#play-btn-i');
    if (audioBtn !== null) { 
        
        audioI.text('play_arrow');
        audioBtn.click(function(e) {
			
            if (audio.dataset.state === 'play') {
                audio.dataset.state =  'pause';
                audio.pause();
                audioI.text('play_arrow');
     
            } else {
                audio.dataset.state = 'play';
                audio.play();
                audioI.text('pause');         
            }
        });
    } else {
		console.log("audioBtn null");
	}
	
    var dialog = document.querySelector('#font-size-dialog');
    var showDialogButton = document.querySelector('#font_adjust_menu_btn');
    if (! dialog.showModal) {
      dialogPolyfill.registerDialog(dialog);
    }
    showDialogButton.addEventListener('click', function() {
      dialog.showModal();
    });
    document.querySelector('#close-font-size-dialog').addEventListener('click', function() {
      dialog.close();
    });
    $('#increase-font-size').on('click', function() {
        var $curSize = parseInt($('#content').css('font-size'))
        var $newSize = $curSize + 2;
        $('#content').css('font-size', $newSize + 'px');
        var $newLineHeight = parseInt($('#content').css('line-height')) + 2;        
        $('#content').css('line-height', $newLineHeight + 'px');
    });
    $('#decrease-font-size').on('click', function() {
        var $curSize = parseInt($('#content').css('font-size'));
        var $newSize = $curSize - 2;
        $('#content').css('font-size', $newSize + 'px');
        var $newLineHeight = parseInt($('#content').css('line-height')) - 2;        
        $('#content').css('line-height', $newLineHeight + 'px');
    });
  </script>
  <script type='text/javascript' src='./pwa-main.js'></script>
</body>
